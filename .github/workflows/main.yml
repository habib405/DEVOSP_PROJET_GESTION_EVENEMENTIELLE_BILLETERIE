name: CI/CD Pipeline - Billetterie Kubernetes

on:
  push:
    branches:
      - main  # Le pipeline se lance quand tu push sur main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Connexion à Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push Backend
        run: |
          docker build -t habibdiao405/projet-back:latest ./backend
          docker push habibdiao405/projet-back:latest

      - name: Build et Push Frontend
        run: |
          docker build -t habibdiao405/projet-frontend:latest ./frontend
          docker push habibdiao405/projet-frontend:latest

  deploy-to-aws:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Déploiement sur AWS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            # On se déplace dans le dossier du projet sur le serveur
            cd /home/ubuntu/DEVOSP_PROJET_GESTION_EVENEMENTIELLE_BILLETERIE
            
            # On récupère les derniers fichiers YAML (k8s/)
            git pull origin main
            
            # On applique la configuration Kubernetes
            # K3s utilise souvent la commande 'k3s kubectl' ou juste 'kubectl'
            kubectl apply -f k8s/
            
            # On force le redémarrage pour charger les nouvelles images
            kubectl rollout restart deployment back
            kubectl rollout restart deployment front