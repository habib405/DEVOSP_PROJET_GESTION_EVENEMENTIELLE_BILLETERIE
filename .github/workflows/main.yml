name: CI/CD Pipeline - Billetterie Kubernetes

on:
  push:
    branches:
      - main  # Le pipeline se lance quand tu push sur main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Fait taire le warning Node.js 20

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push Backend
        run: |
          docker build -t habibdiao405/projet-back:latest ./back
          docker push habibdiao405/projet-back:latest

      - name: Build et Push Frontend
        run: |
          docker build -t habibdiao405/projet-frontend:latest ./Frontend
          docker push habibdiao405/projet-frontend:latest

  deploy-to-aws:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Déploiement sur AWS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd /home/ubuntu/DEVOSP_PROJET_GESTION_EVENEMENTIELLE_BILLETERIE
            
            # 1. On force le serveur à être EXACTEMENT comme GitHub (zéro conflit)
            git fetch origin main
            git reset --hard origin/main
            
            # 2. On s'assure que le namespace existe pour le projet
            kubectl create namespace billetterie || true
            
            # 3. On applique la configuration DANS le namespace billetterie
            kubectl apply -f k8s/ -n billetterie
            
            # 4. On force le rechargement des nouvelles images
            kubectl rollout restart deployment back -n billetterie
            kubectl rollout restart deployment front -n billetterie
