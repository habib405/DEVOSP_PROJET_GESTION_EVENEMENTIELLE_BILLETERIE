name: CI/CD Pipeline - Billetterie Kubernetes

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --- NOUVEAU JOB : VALIDATION DU CODE ---
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # Tests Backend (Spring Boot)
      - name: Configurer JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run Backend Unit Tests
        run: mvn test -f back/pom.xml

      # Tests Frontend (React)
      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './Frontend/package-lock.json'
      - name: Run Frontend Tests
        run: |
          cd Frontend
          npm install
          npm test -- --watchAll=false

  # --- MODIFICATION : AJOUT DE "NEEDS" ---
  build-and-push:
    needs: tests # Le build ne démarre QUE si les tests passent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push Backend
        run: |
          docker build -t habibdiao405/projet-back:latest ./back
          docker push habibdiao405/projet-back:latest

      - name: Build et Push Frontend
        run: |
          docker build -t habibdiao405/projet-frontend:latest ./Frontend
          docker push habibdiao405/projet-frontend:latest

  deploy-to-aws:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Déploiement sur AWS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd /home/ubuntu/DEVOSP_PROJET_GESTION_EVENEMENTIELLE_BILLETERIE
            git fetch origin main
            git reset --hard origin/main
            kubectl create namespace billetterie || true
            kubectl apply -f k8s/ -n billetterie
            kubectl rollout restart deployment back -n billetterie
            kubectl rollout restart deployment front -n billetterie
