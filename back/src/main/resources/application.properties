spring.application.name=gestion-evenementielle

# ── Docker Compose auto-start ──────────────────────────────────────────────
spring.docker.compose.enabled=false

# ── Server ────────────────────────────────────────────────────────────────
server.port=8081

# ── PostgreSQL ─────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5430/postgres
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── JWT ────────────────────────────────────────────────────────────────────
# Generate with: openssl rand -base64 64
jwt.secret=${JWT_SECRET:changeme_replace_with_secure_base64_secret}
jwt.expiration-ms=86400000

# ── SMTP Gmail ─────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from=noreply@eventplatform.com
