apiVersion: apps/v1
kind: Deployment
metadata:
  name: back
  namespace: billetterie # Crucial pour rejoindre postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: back
  template:
    metadata:
      labels:
        app: back
    spec:
      containers:
        - name: back
          image: habibdiao405/projet-back:latest
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/postgres
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: postgres
            - name: STRIPE_SECRET_KEY
              value: "sk_test_51TSHJbAuRLwOSs0NyFUn3qJjK76HQT9Mo2qQGESxQPEmo3aO2gQOvPApfquzavRwNLXmP4GQiMbBb9kM2QR9ITXu00sTt5CVKr"
            - name: STRIPE_PUBLISHABLE_KEY
              value: "pk_test_51TSHJbAuRLwOSs0NkHYDlaxeHQ6nSDAogfsLMCtz8vBWhB5Ww2sIkd495ank8tPJQCTQt1rcnjWIod8Tscy0Eiz600iM8BgnGW"
            - name: STRIPE_SUCCESS_URL
              value: "http://16.16.196.41:30000/payment/success" # IP AWS au lieu de localhost
            - name: STRIPE_CANCEL_URL
              value: "http://16.16.196.41:30000/payment/cancel"
---
apiVersion: v1
kind: Service
metadata:
  name: back
  namespace: billetterie
spec:
  selector:
    app: back
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
      nodePort: 30001 # On expose le backend sur le port 30001
  type: NodePort # Changé de ClusterIP à NodePort pour l'accès externe
