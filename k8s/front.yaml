apiVersion: apps/v1
kind: Deployment
metadata:
  name: front
  namespace: billetterie # Précise bien le namespace ici
spec:
  replicas: 1
  selector:
    matchLabels:
      app: front
  template:
    metadata:
      labels:
        app: front
    spec:
      containers:
        - name: front
          image: habibdiao405/projet-frontend:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: front-service
  namespace: billetterie # Et ici aussi pour que le service trouve les pods
spec:
  selector:
    app: front
  ports:
    - protocol: TCP
      port: 3000       # Port interne du service
      targetPort: 3000 # Port exposé par ton conteneur React
      nodePort: 30000  # Port externe accessible via l'IP AWS
  type: NodePort
